<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图片处理</title>
    <link rel="stylesheet" href="./styles.css?v=20260708-compact-nav" />
  </head>
  <body>
    <main class="app">
      <nav class="mode-nav" aria-label="图片工具">
        <button class="mode-tab is-active" type="button" data-mode="compress">
          <span class="mode-tab-title">图片压缩</span>
        </button>
        <button class="mode-tab" type="button" data-mode="remove-bg">
          <span class="mode-tab-title">去背景</span>
        </button>
        <button class="mode-tab" type="button" data-mode="watermark">
          <span class="mode-tab-title">加水印</span>
        </button>
      </nav>

      <section class="status-bar">
        <div class="totals" aria-live="polite">
          <span><strong>仅本地处理</strong></span>
          <span><strong id="fileCount">0</strong> 张</span>
          <span><strong id="sizeDelta">0 KB</strong> 变化</span>
        </div>
      </section>

      <section class="workspace">
        <aside class="panel controls">
          <div class="asset-box">
            <label class="dropzone" id="dropzone">
              <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" multiple />
              <span class="drop-title">拖入图片</span>
              <span class="drop-subtitle">支持批量导入</span>
            </label>
          </div>

          <section class="mode-screen is-active" data-screen="compress">
            <div class="mode-screen-head">
              <h3>压缩设置</h3>
            </div>
            <div class="field">
              <label for="compressFormat">导出格式</label>
              <select id="compressFormat">
                <option value="image/webp">WebP</option>
                <option value="image/jpeg">JPG</option>
              </select>
            </div>

            <div class="field">
              <div class="field-row">
                <label for="compressQuality">清晰度</label>
                <output id="compressQualityValue" for="compressQuality">86</output>
              </div>
              <input id="compressQuality" type="range" min="60" max="96" value="86" />
            </div>

            <div class="field">
              <label for="compressMaxEdge">最大边长</label>
              <input id="compressMaxEdge" type="number" min="256" step="128" placeholder="原尺寸" />
            </div>

            <div class="mode-actions">
              <button class="primary" id="compressRunBtn" type="button" disabled>开始压缩</button>
            </div>
          </section>

          <section class="mode-screen" data-screen="remove-bg">
            <div class="mode-screen-head">
              <h3>主体提取</h3>
            </div>
            <div class="field">
              <label for="bgFormat">导出格式</label>
              <select id="bgFormat">
                <option value="image/png">PNG</option>
                <option value="image/webp">WebP</option>
                <option value="image/jpeg">JPG</option>
              </select>
            </div>

            <div class="field">
              <div class="field-row">
                <label for="bgTolerance">背景容差</label>
                <output id="bgToleranceValue" for="bgTolerance">36</output>
              </div>
              <input id="bgTolerance" type="range" min="12" max="110" value="36" />
            </div>

            <div class="field">
              <label for="bgMaxEdge">最大边长</label>
              <input id="bgMaxEdge" type="number" min="256" step="128" placeholder="原尺寸" />
            </div>

            <div class="mode-actions">
              <button class="primary" id="removeBgApplyBtn" type="button" disabled>去背景当前</button>
              <button id="removeBgBatchBtn" type="button" disabled>批量去背景</button>
              <button id="removeBgUndoBtn" type="button" disabled>撤销当前</button>
            </div>
          </section>

          <section class="mode-screen" data-screen="watermark">
            <div class="mode-screen-head">
              <h3>水印设置</h3>
            </div>
            <div class="field">
              <label for="watermarkText">水印文字</label>
              <input id="watermarkText" type="text" maxlength="40" placeholder="例如 品牌名" />
            </div>

            <div class="split">
              <div class="field compact">
                <label for="watermarkFormat">导出格式</label>
                <select id="watermarkFormat">
                  <option value="image/webp">WebP</option>
                  <option value="image/jpeg">JPG</option>
                  <option value="image/png">PNG</option>
                </select>
              </div>
              <div class="field compact">
                <label for="watermarkColor">颜色</label>
                <input id="watermarkColor" type="color" value="#ffffff" />
              </div>
            </div>

            <div class="field">
              <label for="watermarkLayout">铺法</label>
              <select id="watermarkLayout">
                <option value="single">单个位置</option>
                <option value="scatter">全屏随机</option>
              </select>
            </div>

            <div class="field" id="watermarkPositionField">
              <label for="watermarkPosition">位置</label>
              <select id="watermarkPosition">
                <option value="bottom-right">右下</option>
                <option value="bottom-left">左下</option>
                <option value="top-right">右上</option>
                <option value="top-left">左上</option>
                <option value="center">居中</option>
              </select>
            </div>

            <div class="field" id="watermarkCountField" hidden>
              <label for="watermarkCount">随机数量</label>
              <input id="watermarkCount" type="number" min="4" max="80" value="12" />
            </div>

            <div class="field">
              <div class="field-row">
                <label for="watermarkOpacity">透明度</label>
                <output id="watermarkOpacityValue" for="watermarkOpacity">55</output>
              </div>
              <input id="watermarkOpacity" type="range" min="15" max="90" value="55" />
            </div>

            <div class="field">
              <div class="field-row">
                <label for="watermarkSize">大小</label>
                <output id="watermarkSizeValue" for="watermarkSize">5</output>
              </div>
              <input id="watermarkSize" type="range" min="3" max="12" value="5" />
            </div>

            <div class="field">
              <label for="watermarkMaxEdge">最大边长</label>
              <input id="watermarkMaxEdge" type="number" min="256" step="128" placeholder="原尺寸" />
            </div>

            <div class="mode-actions">
              <button class="primary" id="watermarkApplyBtn" type="button" disabled>加水印当前</button>
              <button id="watermarkBatchBtn" type="button" disabled>批量加水印</button>
              <button id="watermarkUndoBtn" type="button" disabled>撤销当前</button>
            </div>
          </section>

          <div class="actions secondary-actions">
            <button id="downloadBtn" type="button" disabled>下载结果</button>
            <button class="ghost" id="clearBtn" type="button" disabled>清空</button>
          </div>
        </aside>

        <section class="panel result-panel">
          <div class="panel-head">
            <p id="batchStatus" class="status-text">等待选择图片</p>
          </div>

          <div class="preview-card preview-card-single">
            <div class="preview-label">
              <span id="currentName">当前图片</span>
              <strong id="currentSize">0 KB</strong>
            </div>
            <div class="preview" id="currentPreview">
              <div class="preview-empty">选择图片后显示</div>
            </div>
          </div>

          <div class="queue" id="queue" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <script src="./app.js?v=20260708-compact-nav"></script>
  </body>
</html>
